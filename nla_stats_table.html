<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0f1a;--surface:#111827;--border:rgba(255,255,255,.08);--text:#e2e8f0;--muted:#64748b}
body{background:var(--bg);color:var(--text);font-family:'Barlow Condensed',sans-serif;min-height:100vh;padding-bottom:40px}
.header{background:linear-gradient(135deg,#0f172a,#1e293b);border-bottom:1px solid var(--border);padding:18px 24px;display:flex;align-items:center;gap:16px}
.back-btn{color:var(--muted);text-decoration:none;font-size:13px;font-weight:700;letter-spacing:1px}
.header h1{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px}
.subtitle{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.season-badge{background:rgba(232,25,44,.15);border:1px solid rgba(232,25,44,.3);color:#f87171;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;margin-left:auto}
.tabs{display:flex;padding:0 24px;background:rgba(0,0,0,.2);border-bottom:1px solid var(--border)}
.tab{padding:12px 18px;cursor:pointer;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);border-bottom:2px solid transparent}
.tab.active{color:#f87171;border-bottom-color:#e8192c}
.wrap{padding:24px;max-width:1100px;margin:0 auto}
.metric-bar{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.metric-bar .lbl{font-size:10px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-right:4px}
.msel{padding:8px 14px;border-radius:8px;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:12px;font-weight:700;letter-spacing:1px;font-family:'Barlow Condensed',sans-serif}
.msel.active{background:rgba(34,197,94,.12);border-color:rgba(34,197,94,.4);color:#4ade80}
.rank-list{display:flex;flex-direction:column;gap:8px}
.rank-row{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 16px}
.rank-pos{font-family:'Bebas Neue',sans-serif;font-size:26px;width:36px;text-align:center;color:var(--muted)}
.rank-pos.top1{color:#fbbf24}.rank-pos.top2{color:#cbd5e1}.rank-pos.top3{color:#d97706}
.rank-info{flex:1.3}
.rank-name{font-size:16px;font-weight:700}
.rank-sub{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.rank-bar-wrap{flex:2;height:8px;background:rgba(255,255,255,.05);border-radius:4px;overflow:hidden}
.rank-bar{height:100%;border-radius:4px}
.rank-val{font-family:'Bebas Neue',sans-serif;font-size:22px;width:74px;text-align:right}
.tc-links{display:flex;gap:4px;width:230px}
.tc-links a{flex:1;text-align:center;padding:6px 3px;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:6px;color:var(--text);text-decoration:none;font-size:10px;font-weight:700}
.tc-links a:hover{background:rgba(255,255,255,.12)}
#players-tab{display:none}
.filters{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
select{background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-size:13px}
.pos-PUNTA{color:#22c55e}.pos-OPUESTO{color:#818cf8}.pos-CENTRAL{color:#f97316}.pos-ARMADOR{color:#fbbf24}.pos-LIBERO{color:#06b6d4}

var SLUG=function(t){return t.toLowerCase().replace(/ /g,'_');};
var currentMetric='atk_eff';
var MC={atk_eff:'#f97316',srv_eff:'#22c55e',rec_eff:'#818cf8',blk_eff:'#fbbf24'};
var MR={atk_eff:false,srv_eff:false,rec_eff:true,blk_eff:true};
function ec(v,r){if(v==null)return '#475569';if(r)return v>=40?'#22c55e':v>=25?'#fbbf24':v>=10?'#f97316':'#ef4444';return v>=30?'#22c55e':v>=20?'#fbbf24':v>=0?'#f97316':'#ef4444';}
function fmt(v){return v==null?'—':(v>=0?'+':'')+v+'%';}

function renderTeams(){
  var isRec=MR[currentMetric];
  // ALWAYS sorted by ranking, best to worst, on selected fundamento
  var data=TEAMS.filter(function(t){return t[currentMetric]!=null;}).sort(function(a,b){return b[currentMetric]-a[currentMetric];});
  var maxAbs=Math.max.apply(null,data.map(function(t){return Math.abs(t[currentMetric]);}).concat([1]));
  document.getElementById('teams-list').innerHTML=data.map(function(t,i){
    var v=t[currentMetric],vc=ec(v,isRec),bw=Math.abs(v)/maxAbs*100;
    var pc=i===0?'top1':i===1?'top2':i===2?'top3':'';
    var col=TEAM_COLORS[t.team]||'#64748b', slug=SLUG(t.team);
    return '<div class="rank-row"><div class="rank-pos '+pc+'">'+(i+1)+'</div>'
      +'<div class="rank-info"><div class="rank-name" style="color:'+col+'">'+t.team+'</div>'
      +'<div class="rank-sub">ATK '+fmt(t.atk_eff)+' · SAQ '+fmt(t.srv_eff)+' · REC '+fmt(t.rec_eff)+' · BLK '+fmt(t.blk_eff)+'</div></div>'
      +'<div class="rank-bar-wrap"><div class="rank-bar" style="width:'+bw+'%;background:'+vc+'"></div></div>'
      +'<div class="rank-val" style="color:'+vc+'">'+fmt(v)+'</div>'
      +'<div class="tc-links">'
        +'<a href="hm_ataque.html?equipo='+slug+'">⚡</a>'
        +'<a href="hm_saque.html?equipo='+slug+'">🎯</a>'
        +'<a href="hm_recepcion.html?equipo='+slug+'">🛡️</a>'
        +'<a href="hm_armador.html?equipo='+slug+'">🎱</a>'
        +'<a href="game_plan.html?rival='+slug+'" title="Game Plan">📋</a>'
      +'</div></div>';
  }).join('');
}
function renderPlayers(){
  var isRec=MR[currentMetric];
  var team=document.getElementById('f-team').value, pos=document.getElementById('f-pos').value;
  // ALWAYS sorted by ranking on selected fundamento
  var data=PLAYERS.filter(function(p){return p[currentMetric]!=null&&(!team||p.team===team)&&(!pos||p.pos_label===pos);})
                  .sort(function(a,b){return b[currentMetric]-a[currentMetric];});
  var maxAbs=Math.max.apply(null,data.map(function(p){return Math.abs(p[currentMetric]);}).concat([1]));
  document.getElementById('players-list').innerHTML=data.map(function(p,i){
    var v=p[currentMetric],vc=ec(v,isRec),bw=Math.abs(v)/maxAbs*100;
    var pc=i===0?'top1':i===1?'top2':i===2?'top3':'';
    return '<div class="rank-row"><div class="rank-pos '+pc+'">'+(i+1)+'</div>'
      +'<div class="rank-info"><div class="rank-name">#'+p.num+' '+p.name+'</div>'
      +'<div class="rank-sub">'+p.team+(p.pos_label&&p.pos_label!=='?'?' · <span class="pos-'+p.pos_label+'">'+p.pos_label+'</span>':'')+'</div></div>'
      +'<div class="rank-bar-wrap"><div class="rank-bar" style="width:'+bw+'%;background:'+vc+'"></div></div>'
      +'<div class="rank-val" style="color:'+vc+'">'+fmt(v)+'</div></div>';
  }).join('');
}
function renderAll(){renderTeams();renderPlayers();}

document.querySelectorAll('.tab').forEach(function(tab){tab.addEventListener('click',function(){

  tab.classList.add('active');
  document.getElementById('teams-tab').style.display=tab.dataset.t==='teams'?'block':'none';

});});
