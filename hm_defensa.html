<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANALISIS DE DEFENSA — Nafels 2026</title>
<style>
  :root{--bg:#0a0e1a;--card:#11162a;--card2:#0d1322;--border:#1e2944;--border2:#26314f;--text:#e8edf7;--muted:#8493b0;--naf:#F97316;
    --r-perf:#22C55E;--r-good:#84CC16;--r-reg:#EAB308;--r-bad:#F97316;--r-err:#EF4444}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Barlow Condensed',system-ui,sans-serif;display:flex;min-height:100vh}
  .side{width:240px;flex-shrink:0;background:var(--card2);border-right:1px solid var(--border);padding:18px 16px;position:sticky;top:0;height:100vh;overflow-y:auto}
  .main{flex:1;padding:22px 26px;max-width:1100px}
  .back{color:var(--muted);font-size:12px;text-decoration:none;letter-spacing:1px;text-transform:uppercase}
  .logo{font-size:20px;font-weight:800;letter-spacing:.5px;margin:8px 0 2px}
  .logo span{color:var(--naf)}
  .tag{color:var(--muted);font-size:12px;margin-bottom:16px}
  .flabel{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:800;margin:14px 0 6px}
  .psel{width:100%;background:var(--card2);border:1px solid var(--border2);color:var(--text);padding:8px 10px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer}
  .psel option{background:#0D0E1A}
  .vbtn{width:100%;margin-top:8px;background:rgba(249,115,22,.12);border:1px solid rgba(249,115,22,.45);color:var(--naf);padding:9px;border-radius:8px;font-family:inherit;font-weight:800;font-size:13px;letter-spacing:1px;cursor:pointer}
  .chips{display:flex;flex-wrap:wrap;gap:5px}
  .chip{background:var(--card);border:1px solid var(--border2);color:var(--muted);padding:4px 9px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
  .chip.on{background:var(--naf);border-color:var(--naf);color:#1a1206}
  .sec{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:800;margin:22px 0 10px}
  .hdr-t{font-size:24px;font-weight:800;letter-spacing:.5px}
  .hdr-s{color:var(--muted);font-size:13px;margin-bottom:4px}
  .g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:6px}
  .scard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px}
  .scard .big{font-family:'Bebas Neue','Barlow Condensed',sans-serif;font-size:34px;line-height:1;font-weight:800}
  .scard .lbl{color:var(--muted);font-size:11px;margin-top:3px}
  .panel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:18px}
  .court-title{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px;font-weight:800;text-align:center}
  .legend{display:flex;gap:14px;justify-content:center;margin-top:6px}
  .leg-item{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px}
  .leg-dot{width:9px;height:9px;border-radius:2px}
  .nodata{color:var(--muted);text-align:center;padding:60px 20px;font-size:15px}
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
  @media(max-width:760px){body{flex-direction:column}.side{width:100%;height:auto;position:static}.g4{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
  <div class="side">
    <a href="index.html" class="back">← Inicio</a>
    <div class="logo">AXPO VOLLEY <span>NAFELS</span></div>
    <div class="tag">Análisis de Defensa</div>

    <div class="flabel">Jugador</div>
    <select class="psel" id="psel" onchange="onPlayer(this.value)"><option value="">Seleccionar…</option></select>
    <button id="ver-video-btn" class="vbtn" onclick="abrirVideo()">🎬 VER VIDEO DE ESTAS DEFENSAS</button>

    <div class="flabel">Rival</div>
    <div class="chips" id="f-rival"></div>
    <div class="flabel">Set</div>
    <div class="chips" id="f-set"></div>
    <div class="flabel">Valoración</div>
    <div class="chips" id="f-res"></div>
  </div>

  <div class="main">
    <div class="hdr-t" id="hdr-t">AXPO VOLLEY NAFELS — DEFENSA 2026</div>
    <div class="hdr-s" id="hdr-s">26 partidos NLA · <span id="cnt">0</span> defensas</div>
    <div id="content"><div class="nodata">Elegí un jugador para ver su defensa</div></div>
  </div>

  <script src="datos_video.js"></script>
  <script>
  (function(){
    var VD=(window.VIDEO_DATA&&window.VIDEO_DATA.matches)||{};
    var RES_ORDER=['#','+','!','-','='];
    var RES_LABEL={'#':'Perfecta','+':'Buena','!':'Regular','-':'Mala','=':'Error'};
    var RES_COLOR={'#':'var(--r-perf)','+':'var(--r-good)','!':'var(--r-reg)','-':'var(--r-bad)','=':'var(--r-err)'};
    var RES_HEX={'#':'#22C55E','+':'#84CC16','!':'#EAB308','-':'#F97316','=':'#EF4444'};

    // ---- juntar defensas de Näfels ----
    var ALL=[];
    Object.keys(VD).forEach(function(c){ (VD[c].actions||[]).forEach(function(a){ if(a.sk==='Defensa'){ var o={}; for(var k in a)o[k]=a[k]; o.opp=VD[c].opponent||'Rival'; o.code=c; ALL.push(o); } }); });
    var PLAYERS={};
    ALL.forEach(function(a){ if(!PLAYERS[a.num])PLAYERS[a.num]={num:a.num,name:a.name,acts:[]}; PLAYERS[a.num].acts.push(a); });
    var RIVALS=[]; ALL.forEach(function(a){ if(RIVALS.indexOf(a.opp)<0)RIVALS.push(a.opp); }); RIVALS.sort();

    var F={player:'',rival:'all',set:'all',res:'all'};

    // selector jugador (ordenado por cantidad)
    var psel=document.getElementById('psel');
    Object.values(PLAYERS).sort(function(a,b){return b.acts.length-a.acts.length;}).forEach(function(p){
      var o=document.createElement('option'); o.value=p.num; o.textContent='#'+parseInt(p.num,10)+' · '+p.name+' ('+p.acts.length+')'; psel.appendChild(o);
    });
    // chips
    function chipset(el,items,key){
      var box=document.getElementById(el);
      box.innerHTML=items.map(function(it){ return "<span class='chip"+(F[key]===it[0]?' on':'')+"' data-v='"+it[0]+"'>"+it[1]+"</span>"; }).join('');
      box.onclick=function(e){ var c=e.target.closest('[data-v]'); if(!c)return; F[key]=c.dataset.v; chipset(el,items,key); render(); };
    }
    function buildChips(){
      chipset('f-rival',[['all','Todos']].concat(RIVALS.map(function(r){return [r,r];})),'rival');
      chipset('f-set',[['all','Todos'],['1','S1'],['2','S2'],['3','S3'],['4','S4'],['5','S5']],'set');
      chipset('f-res',[['all','Todas']].concat(RES_ORDER.map(function(r){return [r,RES_LABEL[r]];})),'res');
    }
    buildChips();

    window.onPlayer=function(v){ F.player=v; render(); };

    function filtered(){
      if(!F.player||!PLAYERS[F.player])return [];
      return PLAYERS[F.player].acts.filter(function(a){
        if(F.rival!=='all'&&a.opp!==F.rival)return false;
        if(F.set!=='all'&&String(a.set)!==F.set)return false;
        if(F.res!=='all'&&a.ev!==F.res)return false;
        return true;
      });
    }
    function eff(acts){ if(!acts.length)return null; var s=0; acts.forEach(function(a){ s+=(a.ev==='#'?1:a.ev==='+'?0.5:a.ev==='-'?-0.5:a.ev==='='?-1:0); }); return Math.round(s/acts.length*100); }
    function effColor(e){ return e===null?'#475569':e>=40?'#22C55E':e>=15?'#84CC16':e>=0?'#EAB308':e>=-25?'#F97316':'#EF4444'; }
    function pct(n,t){ return t>0?Math.round(n/t*100):0; }

    // ---- cancha: arriba RIVAL (origen del ataque), abajo PROPIO (destino de la defensa) ----
    function courtSVG(origZ,destZ,total){
      var W=180,H=150,P=5,CW=(W-P*2)/3,CH=(H/2-P)/3;
      var RIVAL=[[1,6,5],[9,8,7],[2,3,4]], OWN=[[4,3,2],[7,8,9],[5,6,1]];
      var maxO=Math.max.apply(null,Object.values(origZ).concat([1])), maxD=Math.max.apply(null,Object.values(destZ).concat([1]));
      var s="<svg viewBox='0 0 "+W+" "+H+"' xmlns='http://www.w3.org/2000/svg' style='width:100%;display:block'>";
      s+="<style>text{pointer-events:none}</style>";
      s+="<rect width='"+W+"' height='"+H+"' fill='rgba(13,14,26,.97)' rx='8'/>";
      s+="<rect x='"+P+"' y='"+P+"' width='"+(W-P*2)+"' height='"+(H/2-P)+"' fill='rgba(239,68,68,.04)' rx='3'/>";
      s+="<rect x='"+P+"' y='"+(H/2)+"' width='"+(W-P*2)+"' height='"+(H/2-P)+"' fill='rgba(34,197,94,.04)' rx='3'/>";
      s+="<rect x='"+P+"' y='"+(H/2-1.5)+"' width='"+(W-P*2)+"' height='3' fill='rgba(255,255,255,.35)' rx='1.5'/>";
      RIVAL.forEach(function(row,ri){ row.forEach(function(zone,ci){
        var cnt=origZ[zone]||0,x=P+ci*CW,y=P+ri*CH, op=cnt>0?0.1+(cnt/maxO)*0.8:0.03;
        s+="<rect x='"+(x+1.5)+"' y='"+(y+1.5)+"' width='"+(CW-3)+"' height='"+(CH-3)+"' fill='#EF4444' opacity='"+op+"' rx='3'"+(cnt>0?" onclick=\"verZona("+zone+",'oz')\" style=\"cursor:pointer\"":"")+"/>";
        if(cnt>0){ s+="<text x='"+(x+CW/2)+"' y='"+(y+CH/2+4)+"' font-family='Bebas Neue,sans-serif' font-size='12' fill='white' text-anchor='middle'>"+cnt+"</text>";
          if(total>0)s+="<text x='"+(x+CW/2)+"' y='"+(y+CH/2+13)+"' font-size='6' fill='rgba(255,255,255,.5)' text-anchor='middle'>"+pct(cnt,total)+"%</text>"; }
        s+="<text x='"+(x+4)+"' y='"+(y+10)+"' font-size='6' fill='rgba(255,255,255,.2)'>"+zone+"</text>";
      }); });
      OWN.forEach(function(row,ri){ row.forEach(function(zone,ci){
        var cnt=destZ[zone]||0,x=P+ci*CW,y=H/2+ri*CH, op=cnt>0?0.1+(cnt/maxD)*0.8:0.03;
        s+="<rect x='"+(x+1.5)+"' y='"+(y+1.5)+"' width='"+(CW-3)+"' height='"+(CH-3)+"' fill='#22C55E' opacity='"+op+"' rx='3'"+(cnt>0?" onclick=\"verZona("+zone+",'dz')\" style=\"cursor:pointer\"":"")+"/>";
        if(cnt>0){ s+="<text x='"+(x+CW/2)+"' y='"+(y+CH/2+4)+"' font-family='Bebas Neue,sans-serif' font-size='12' fill='white' text-anchor='middle'>"+cnt+"</text>";
          if(total>0)s+="<text x='"+(x+CW/2)+"' y='"+(y+CH/2+13)+"' font-size='6' fill='rgba(255,255,255,.5)' text-anchor='middle'>"+pct(cnt,total)+"%</text>"; }
        s+="<text x='"+(x+4)+"' y='"+(y+10)+"' font-size='6' fill='rgba(255,255,255,.15)'>"+zone+"</text>";
      }); });
      s+="<text x='"+(W/2)+"' y='"+(P+8)+"' font-size='6' fill='rgba(239,68,68,.55)' text-anchor='middle' font-weight='800' letter-spacing='2'>▲ ATAQUE RIVAL</text>";
      s+="<text x='"+(W/2)+"' y='"+(H-3)+"' font-size='6' fill='rgba(34,197,94,.5)' text-anchor='middle' font-weight='800' letter-spacing='2'>▼ DESTINO DEFENSA</text>";
      s+="</svg>"; return s;
    }

    window.verZona=function(zone,which){
      if(!F.player)return;
      window.open('cortes.html?num='+encodeURIComponent(F.player)+'&sk=Defensa&'+which+'='+zone,'_blank');
    };
    window.abrirVideo=function(){
      if(!F.player){alert('Elegí un jugador primero.');return;}
      window.open('cortes.html?num='+encodeURIComponent(F.player)+'&sk=Defensa','_blank');
    };

    function render(){
      var c=document.getElementById('content'), acts=filtered();
      document.getElementById('cnt').textContent=acts.length;
      if(!F.player){ c.innerHTML="<div class='nodata'>Elegí un jugador para ver su defensa</div>"; return; }
      var p=PLAYERS[F.player];
      document.getElementById('hdr-t').textContent=p.name+' #'+parseInt(p.num,10)+' — DEFENSA';
      if(!acts.length){ c.innerHTML="<div class='nodata'>Sin defensas para los filtros elegidos</div>"; return; }
      var total=acts.length, rc={}; acts.forEach(function(a){rc[a.ev]=(rc[a.ev]||0)+1;});
      var e=eff(acts), perf=pct(rc['#']||0,total), good=pct((rc['#']||0)+(rc['+']||0),total), err=pct(rc['=']||0,total);
      var origZ={},destZ={}; acts.forEach(function(a){ if(a.oz)origZ[a.oz]=(origZ[a.oz]||0)+1; if(a.dz)destZ[a.dz]=(destZ[a.dz]||0)+1; });

      var html="<div class='sec'>"+p.name+" #"+parseInt(p.num,10)+" · "+total+" defensas</div>";
      html+="<div class='g4'>";
      html+="<div class='scard'><div class='big' style='color:"+effColor(e)+"'>"+(e!==null?e+'%':'--')+"</div><div class='lbl'>Eficiencia</div></div>";
      html+="<div class='scard'><div class='big' style='color:#22C55E'>"+good+"%</div><div class='lbl'>Defensas buenas (#/+)</div></div>";
      html+="<div class='scard'><div class='big' style='color:#84CC16'>"+perf+"%</div><div class='lbl'>Perfectas (#)</div></div>";
      html+="<div class='scard'><div class='big' style='color:#EF4444'>"+err+"%</div><div class='lbl'>Errores (=)</div></div>";
      html+="</div>";

      // result bar
      html+="<div class='panel'><div style='display:flex;gap:14px;flex-wrap:wrap;margin-bottom:8px'>";
      RES_ORDER.forEach(function(r){ var n=rc[r]||0; if(!n)return; html+="<div style='text-align:center'><div style='font-family:Bebas Neue,sans-serif;font-size:22px;color:"+RES_HEX[r]+"'>"+n+"</div><div style='font-size:11px;color:var(--muted)'>"+RES_LABEL[r]+" ("+pct(n,total)+"%)</div></div>"; });
      html+="</div><div style='display:flex;height:8px;border-radius:4px;overflow:hidden'>";
      RES_ORDER.forEach(function(r){ var n=rc[r]||0; if(n)html+="<div style='flex:"+n+";background:"+RES_HEX[r]+"'></div>"; });
      html+="</div></div>";

      // court
      html+="<div class='sec'>Mapa de defensa</div>";
      html+="<div class='panel' style='max-width:360px'>";
      html+="<div class='court-title' style='color:#94a3b8'>Origen del ataque ↔ destino de la defensa</div>";
      html+=courtSVG(origZ,destZ,total);
      html+="<div class='legend'><div class='leg-item'><div class='leg-dot' style='background:#EF4444'></div>De dónde atacaron</div><div class='leg-item'><div class='leg-dot' style='background:#22C55E'></div>A dónde defendió</div></div>";
      html+="<div style='font-size:11px;color:var(--muted);text-align:center;margin-top:6px'>Clickeá un casillero para ver esas defensas en video 🎬</div>";
      html+="</div>";

      // eff by rival
      var byR={}; PLAYERS[F.player].acts.forEach(function(a){ (byR[a.opp]=byR[a.opp]||[]).push(a); });
      html+="<div class='sec'>Eficiencia por rival</div><div class='panel'>";
      Object.keys(byR).sort().forEach(function(riv){ var ee=eff(byR[riv]);
        html+="<div class='bar-row'><div style='font-size:11px;font-weight:800;color:var(--muted);width:90px;text-align:right;flex-shrink:0'>"+riv+"</div>";
        html+="<div style='flex:1;height:15px;background:rgba(255,255,255,.04);border-radius:4px;overflow:hidden'><div style='height:100%;width:"+Math.max(3,Math.min(100,(ee||0)+50))+"%;background:"+effColor(ee)+"'></div></div>";
        html+="<div style='width:60px;font-size:12px;font-weight:700;color:"+effColor(ee)+"'>"+(ee!==null?ee+'%':'--')+"</div><div style='width:42px;font-size:11px;color:var(--muted);text-align:right'>"+byR[riv].length+"</div></div>";
      });
      html+="</div>";
      c.innerHTML=html;
    }
    render();
  })();
  </script>
</body>
</html>
